name: Build Desktop App

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Ensure powershell alias on macOS
        if: runner.os == 'macOS'
        run: |
          if ! command -v powershell >/dev/null 2>&1; then
            sudo ln -s "$(command -v pwsh)" /usr/local/bin/powershell
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundle-${{ runner.os }}
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: error
